apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "simple-api.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "simple-api.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "simple-api.name" . }}
    spec:
      containers:
        - name: simple-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "simple-api.fullname" . }}-env
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
{{ toYaml .Values.resources | indent 12 }}